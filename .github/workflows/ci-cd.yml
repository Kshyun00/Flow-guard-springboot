name: AIOps-SpringBoot CI/CD

# main 브랜치 push/PR 시 자동 실행, 수동 실행도 가능
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

# GitHub Variables/Secrets에서 가져오는 환경변수
env:
  HARBOR_REGISTRY: ${{ vars.HARBOR_REGISTRY }}
  HARBOR_PROJECT: ${{ vars.HARBOR_PROJECT }}
  IMAGE_NAME: ${{ vars.IMAGE_NAME }}
  AWS_REGION: ${{ vars.AWS_REGION }}
  EKS_CLUSTER_NAME: ${{ vars.EKS_CLUSTER_NAME }}
  K8S_NAMESPACE: ${{ vars.K8S_NAMESPACE }}
  K8S_DEPLOYMENT_NAME: ${{ vars.K8S_DEPLOYMENT_NAME }}
  K8S_CONTAINER_NAME: ${{ vars.K8S_CONTAINER_NAME }}

jobs:
  # CI: 소스 코드 빌드 및 JAR 생성
  build:
    name: Build Spring Boot
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Grant execute permission to Maven wrapper
        run: chmod +x ./mvnw

      # 테스트 제외하고 빌드 (CI 환경에 DB 없음)
      - name: Build application
        run: ./mvnw clean package -DskipTests --no-transfer-progress

      # 다음 job에서 재사용할 수 있도록 JAR 업로드
      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-jar
          path: target/*.jar
          retention-days: 1

  # CI: Docker 이미지 빌드 및 Harbor Registry에 Push
  docker:
    name: Build & Push Image to Harbor
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name != 'pull_request'
    outputs:
      full_image: ${{ steps.meta.outputs.full_image }}
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      # build job에서 생성한 JAR 다운로드
      - name: Download JAR artifact
        uses: actions/download-artifact@v4
        with:
          name: app-jar
          path: target

      # 이미지 태그: 커밋 SHA 앞 7자리 (예: a3aff8a)
      - name: Compute image tag
        id: meta
        run: |
          SHORT_SHA=$(echo "${GITHUB_SHA}" | cut -c1-7)
          echo "image_tag=${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          echo "full_image=${HARBOR_REGISTRY}/${HARBOR_PROJECT}/${IMAGE_NAME}:${SHORT_SHA}" >> "$GITHUB_OUTPUT"

      - name: Login to Harbor
        uses: docker/login-action@v3
        with:
          registry: ${{ env.HARBOR_REGISTRY }}
          username: ${{ secrets.HARBOR_USERNAME }}
          password: ${{ secrets.HARBOR_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # SHA 태그와 latest 태그 두 개로 Push
      - name: Build and push image to Harbor
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ steps.meta.outputs.full_image }}
            ${{ env.HARBOR_REGISTRY }}/${{ env.HARBOR_PROJECT }}/${{ env.IMAGE_NAME }}:latest

  # CD(GitOps): deploy.yaml 이미지 태그를 SHA로 업데이트 → ArgoCD가 감지하여 자동 배포
  update-manifest:
    name: Update Manifest for ArgoCD
    runs-on: ubuntu-latest
    needs: docker
    if: github.event_name != 'pull_request'
    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update image tag in deploy.yaml
        run: |
          sed -i "s|image: ${{ env.HARBOR_REGISTRY }}/${{ env.HARBOR_PROJECT }}/${{ env.IMAGE_NAME }}:.*|image: ${{ needs.docker.outputs.full_image }}|g" deploy.yaml

      - name: Commit and push
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add deploy.yaml
          git diff --cached --quiet || git commit -m "chore: update image tag to ${{ needs.docker.outputs.full_image }}"
          git push

