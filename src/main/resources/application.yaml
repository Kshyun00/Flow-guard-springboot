spring:
  application:
    name: process-monitoring-ai

  datasource:
    url: jdbc:postgresql://localhost:5432/process_monitoring
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:password}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

fastapi:
  base-url: ${FASTAPI_URL:http://localhost:8000}

jwt:
  secret: ${JWT_SECRET:your-secret-key-must-be-at-least-256-bits-long}
  expiration: 86400000       # 1일 (ms)
  refresh-expiration: 604800000  # 7일 (ms)

server:
  port: 8080
